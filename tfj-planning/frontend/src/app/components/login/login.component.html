<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>TFJ Planning</h1>
      <p>Orabank Togo - Connexion</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Identifiant</label>
        <input 
          type="text" 
          id="username" 
          [(ngModel)]="username" 
          name="username" 
          placeholder="Votre identifiant"
          [disabled]="loading"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          name="password" 
          placeholder="Votre mot de passe"
          [disabled]="loading"
          autocomplete="current-password"
          required
        />
      </div>

      <div *ngIf="errorMessage" class="error-message" role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="error-icon">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">Se connecter</span>
        <span *ngIf="loading">Connexion en cours...</span>
      </button>
    </form>

    <div class="login-footer">
      <a routerLink="/home" class="back-link">← Retour à l'accueil</a>
    </div>
  </div>
</div>
