spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  application:
    name: planning-gestion
  
  jackson:
    time-zone: Africa/Lome
    date-format: yyyy-MM-dd

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:planning_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false # Désactivé pour la prod
    hibernate:
      ddl-auto: validate # Ne jamais créer/modifier les tables auto en prod
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: Africa/Lome
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
    show-sql: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      timeout: 30m
  compression:
    enabled: true

logging:
