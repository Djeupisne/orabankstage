ervices:
  # Service Web pour le Backend Spring Boot
  - type: web
    name: tfj-planning-backend
    env: java
    region: frankfurt
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/tfj-planning-1.0.0.jar
    healthCheckPath: /actuator/health
    javaVersion: 17
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: tfj-planning-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: tfj-planning-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: tfj-planning-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      # On met une valeur par défaut "*" pour éviter le blocage au premier déploiement
      # Vous pourrez la changer manuellement dans le dashboard après le déploiement
      - key: CORS_ALLOWED_ORIGINS
        value: "*"

  # Service Frontend Angular (Site Statique)
  - type: static
    name: tfj-planning-frontend
    env: node
    region: frankfurt
    plan: starter
    branch: main
    rootDir: frontend
    buildCommand: npm install && ng build --configuration production
    publishDir: dist/tfj-planning-frontend
    envVars:
      - key: NODE_VERSION
        value: 18
      # Cette variable sera résolue une fois le backend déployé
      - key: API_BASE_URL
        fromService:
          name: tfj-planning-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: tfj-planning-db
    databaseName: tfj_planning
    user: tfj_user
    plan: starter
    region: frankfurt
