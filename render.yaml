services:
  # Service Web pour le Backend Spring Boot
  - type: web
    name: tfj-planning-backend
    env: docker
    region: frankfurt
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/tfj-planning-1.0.0.jar
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: tfj-planning-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: tfj-planning-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: tfj-planning-db
          property: password
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: tfj-planning-db
    databaseName: tfj_planning
    user: tfj_user
    plan: starter
    region: frankfurt
